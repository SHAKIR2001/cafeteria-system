<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cafeteria Pre-Order System</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link
  rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
/>
</head>
<body>
  <main class="login-page">
    <section class="image-frame">
      <img src="../images/food.jpg" alt="Cafeteria food image" />
    </section>

    <section class="login-frame">
      <div class="login-card">
        <img
          class="logo"
          src="../Images/logo.png"
          alt="Cafeteria logo"
        />

        <h3>Uva Wellassa University</h3>
        <h1>Cafeteria<br/>Pre-Order System</h1>
        <p class="subtitle">Please sign in to continue</p>

        <form id="loginForm">
          <label for="username">Email / Username</label>
          <input
            type="text"
            id="username"
            placeholder="Enter your email or username"
            autocomplete="username"
          />

          <div class="password-heading">
  <label for="password">Password</label>
  <a href="#">Forgot Password?</a>
</div>

    <div class="password-field">
    <input
       type="password"
       id="password"
       placeholder="Create a password"
       />

      <button type="button" id="togglePassword" class="eye-btn" aria-label="Show password">
        <i class="fa-regular fa-eye"></i>
       </button>
      </div>
           <label class="remember">
            <input type="checkbox" id="remember" />
            <span>Remember me</span>
          </label>

          <button class="login-button" type="submit">Login</button>

          <p class="register-text">
            Don't have an account?
            <a href="register.html">Register Here</a>
          </p>

          <p id="message"></p>
        </form>
      </div>
    </section>
  </main>

  <script src="../js/script.js"></script>
</body>
</html>
