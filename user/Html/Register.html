<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create New Account</title>
  <link rel="stylesheet" href="../Css/style.css" />
 <link
  rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
/>
</head>
<body>
  <main class="register-page">
    <section class="register-image-frame">
      <img src="../Images/register-food.jpg" alt="Cafeteria meal image" />
    </section>

    <section class="register-frame">
      <div class="register-box">
        <h1>Create New Account</h1>
        <p class="register-subtitle">Please fill in the details to register</p>

        <form id="registerForm">
          <label for="fullName">Full name</label>
          <input
            type="text"
            id="fullName"
            placeholder="Enter your full name"
          />

          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            placeholder="Enter your email"
          />

          <label for="studentId">Student ID</label>
          <input
            type="text"
            id="studentId"
            placeholder="Enter your student ID"
          />

         <label for="registerPassword">Password</label>
         <div class="register-password-field">
          <input
            type="password"
            id="registerPassword"
            placeholder="Create a password"
          />

        
        </div>

        <label for="confirmPassword">Confirm Password</label>
          <input
            type="password"
            id="confirmPassword"
            placeholder="Confirm your password"
        />

        <button type="submit" class="register-btn">Register</button>

          <p class="login-link">
            Already have an account?
            <a href="login.html">Login Here</a>
          </p>

          <p id="registerMessage"></p>
        </form>
      </div>
    </section>
  </main>

  <script src="../Js/script.js"></script>
</body>
</html>
